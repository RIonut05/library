<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="wrapper">
    <div class='header'>
      <div class="logo">
        <h1>Librafy</h1>
        <i data-lucide="book-heart"></i>
      </div>
      <button class='new-book'><i data-lucide="bookmark-plus"></i></button>
    </div>
    <div class="container"></div>
  </div>

  <form action="" class=''>
    <p class='title'>Add a new book to your library</p>

    <div class="title">
      <label for="book-title">Title</label>
      <input type="text" id='book-title' name='book-title' required>
    </div>

    <div class="auth">
      <label for="book-auth">Author</label>
      <input type="text" id='book-auth' name='book-auth' required>
    </div>

    <div class="pages">
      <label for="book-pages">Pages</label>
      <input type="number" id='book-pages' name='book-pages' required>
    </div>

    <div class="status">
      <label for="book-status">Have you read the book?</label>
      <input type="checkbox" id='book-status' name='book-status'>
    </div>

    <button class="book-submit" type='submit'>Add book</button>
  </form>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    // Render all icons in DOM
    lucide.createIcons();
  });
  </script>
  <script src='main.js'></script>
</body>
</html>
